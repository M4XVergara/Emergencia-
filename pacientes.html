<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Bienestar - Pacientes Registrados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/favicon_clinica.png">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">Clínica Bienestar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="user-info"></ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="registro.html">Registro de Pacientes</a></li>
                    <li class="nav-item"><a class="nav-link active" href="pacientes.html">Pacientes Registrados</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logoutUser(event)">Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <h2>Pacientes Registrados</h2>
        <div id="lista-pacientes" class="row g-4 mt-2"></div>
        <div id="sin-pacientes" class="alert alert-info d-none mt-4">No hay pacientes registrados.</div>
    </main>

    <footer class="text-center mt-5 p-3 bg-light">
        <p>Inacap</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SDK de Supabase — debe ir ANTES de supabase.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/patient.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            auth.protectPage();
            auth.displayUserInfo();
        });
        function logoutUser(event) {
            event.preventDefault();
            if (confirm('¿Desea cerrar sesión?')) {
                auth.logout();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
