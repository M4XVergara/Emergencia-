<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Bienestar - Pacientes Registrados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/favicon_clinica.png">
    <style>
        .urgencia-roja     { border-left: 5px solid #dc3545 !important; }
        .urgencia-amarillo { border-left: 5px solid #ffc107 !important; }
        .urgencia-verde    { border-left: 5px solid #198754 !important; }
        .card-patient { transition: transform 0.18s, box-shadow 0.18s; }
        .card-patient:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.13); }
        .filtro-btn { min-width: 110px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logo.png" alt="Logo" class="navbar-logo">
                <span class="ms-2">Clínica Bienestar</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="user-info"></ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="registro.html">Registro</a></li>
                    <li class="nav-item"><a class="nav-link active" href="pacientes.html">Pacientes</a></li>
                    <li class="nav-item d-none" id="nav-admin">
                        <a class="nav-link" href="admin-usuarios.html">👥 Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logoutUser(event)">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Pacientes Registrados</h2>
            <span class="text-muted small" id="total-pacientes"></span>
        </div>

        <!-- Contadores triage -->
        <div class="d-flex flex-wrap gap-2 mb-3">
            <span class="badge bg-danger p-2 fs-6">🔴 Roja: <span id="cnt-roja">0</span></span>
            <span class="badge bg-warning text-dark p-2 fs-6">🟡 Amarillo: <span id="cnt-amarillo">0</span></span>
            <span class="badge bg-success p-2 fs-6">🟢 Verde: <span id="cnt-verde">0</span></span>
        </div>

        <!-- Filtros -->
        <div class="mb-4 d-flex flex-wrap gap-2" id="filtros">
            <button class="btn btn-secondary filtro-btn active" data-filtro="todos">Todos</button>
            <button class="btn btn-outline-danger filtro-btn"   data-filtro="Roja">🔴 Roja</button>
            <button class="btn btn-outline-warning filtro-btn"  data-filtro="Amarillo">🟡 Amarillo</button>
            <button class="btn btn-outline-success filtro-btn"  data-filtro="Verde">🟢 Verde</button>
        </div>

        <!-- Mensajes de éxito/error -->
        <div id="mensaje-pagina"></div>

        <!-- Lista de pacientes -->
        <div id="lista-pacientes" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Cargando pacientes...</p>
            </div>
        </div>
        <div id="sin-pacientes" class="alert alert-info d-none mt-4">No hay pacientes registrados.</div>
    </main>

    <footer class="text-center mt-5 p-3 bg-light"><p>Inacap</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/patient.js"></script>
    <script src="js/validation.js"></script>

    <script>
        // ── Estado global ──────────────────────────────────────────
        let _todosPacientes  = [];
        let _filtroActivo    = 'todos';
        let _esMedico        = false;

        // ── Inicialización ─────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            auth.protectPage();
            auth.displayUserInfo();

            _esMedico = auth.hasAnyRole(['medico', 'admin']);

            if (auth.hasRole('admin')) {
                document.getElementById('nav-admin').classList.remove('d-none');
            }

            // Mensaje post-registro
            const msg = sessionStorage.getItem('newMessage');
            if (msg) {
                mostrarMensaje(msg, 'alert-success');
                sessionStorage.removeItem('newMessage');
            }
            sessionStorage.removeItem('patientIdToEdit');

            // Cargar pacientes
            await cargarPacientes();

            // Filtros
            document.getElementById('filtros').addEventListener('click', (e) => {
                const btn = e.target.closest('[data-filtro]');
                if (!btn) return;
                document.querySelectorAll('.filtro-btn').forEach(b => {
                    b.className = b.className
                        .replace('btn-secondary',      'btn-outline-secondary')
                        .replace('btn-danger',         'btn-outline-danger')
                        .replace('btn-warning',        'btn-outline-warning')
                        .replace('btn-success',        'btn-outline-success')
                        .replace(' active', '');
                });
                btn.className = btn.className
                    .replace('btn-outline-secondary', 'btn-secondary')
                    .replace('btn-outline-danger',    'btn-danger')
                    .replace('btn-outline-warning',   'btn-warning')
                    .replace('btn-outline-success',   'btn-success')
                    + ' active';

                _filtroActivo = btn.dataset.filtro;
                renderCards();
            });

            // Editar / Eliminar (delegación de eventos)
            document.getElementById('lista-pacientes').addEventListener('click', async (e) => {
                if (e.target.classList.contains('btn-edit')) {
                    e.preventDefault();
                    sessionStorage.setItem('patientIdToEdit', e.target.dataset.id);
                    window.location.href = e.target.href;
                }
                if (e.target.classList.contains('btn-delete')) {
                    if (confirm('¿Estás seguro de que deseas eliminar a este paciente?')) {
                        const id = e.target.dataset.id;
                        e.target.disabled    = true;
                        e.target.textContent = 'Eliminando...';
                        const ok = await db.deletePaciente(id);
                        if (ok) {
                            await cargarPacientes();
                            mostrarMensaje('Paciente eliminado.', 'alert-info');
                        } else {
                            mostrarMensaje('Error al eliminar. Intenta nuevamente.', 'alert-danger');
                        }
                    }
                }
            });
        });

        // ── Carga pacientes desde Supabase ─────────────────────────
        async function cargarPacientes() {
            _todosPacientes = await db.getPacientes();
            actualizarContadores();
            renderCards();
        }

        // ── Actualiza los badges de conteo ─────────────────────────
        function actualizarContadores() {
            const total    = _todosPacientes.length;
            const rojas    = _todosPacientes.filter(p => p.urgencia === 'Roja').length;
            const amarillos = _todosPacientes.filter(p => p.urgencia === 'Amarillo').length;
            const verdes   = _todosPacientes.filter(p => p.urgencia === 'Verde').length;

            document.getElementById('cnt-roja').textContent    = rojas;
            document.getElementById('cnt-amarillo').textContent = amarillos;
            document.getElementById('cnt-verde').textContent   = verdes;
            document.getElementById('total-pacientes').textContent =
                total === 0 ? '' : `${total} paciente${total !== 1 ? 's' : ''} en total`;
        }

        // ── Renderiza las tarjetas según el filtro activo ──────────
        function renderCards() {
            const lista      = document.getElementById('lista-pacientes');
            const sinPac     = document.getElementById('sin-pacientes');

            const pacientes = _filtroActivo === 'todos'
                ? _todosPacientes
                : _todosPacientes.filter(p => p.urgencia === _filtroActivo);

            // Ordenar Roja → Amarillo → Verde
            const orden = { Roja: 0, Amarillo: 1, Verde: 2 };
            pacientes.sort((a, b) => (orden[a.urgencia] ?? 3) - (orden[b.urgencia] ?? 3));

            lista.innerHTML = '';

            if (pacientes.length === 0) {
                sinPac.classList.remove('d-none');
            } else {
                sinPac.classList.add('d-none');
                pacientes.forEach(p => lista.insertAdjacentHTML('beforeend', renderCard(p)));
            }
        }

        // ── Genera HTML de una tarjeta ─────────────────────────────
        function renderCard(p) {
            const uMap = {
                Roja:     { cls: 'urgencia-roja',      badge: 'bg-danger',            label: '🔴 Roja — Grave'        },
                Amarillo: { cls: 'urgencia-amarillo',   badge: 'bg-warning text-dark', label: '🟡 Amarillo — Moderada' },
                Verde:    { cls: 'urgencia-verde',      badge: 'bg-success',           label: '🟢 Verde — Leve'        }
            };
            const u = uMap[p.urgencia] || { cls: '', badge: 'bg-secondary', label: 'Sin clasificar' };

            const btnReceta = _esMedico
                ? `<a href="receta.html?patient_id=${p.id}&rut=${encodeURIComponent(p.rut)}&nombre=${encodeURIComponent(p.nombre + ' ' + p.apellidoPaterno)}"
                       class="btn btn-sm btn-info me-1">💊 Receta</a>`
                : '';

            return `
            <div class="col-md-6 col-lg-4">
                <div class="card card-patient h-100 shadow-sm ${u.cls}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0">${p.nombre} ${p.apellidoPaterno} ${p.apellidoMaterno}</h5>
                            <span class="badge ${u.badge} ms-2" style="white-space:nowrap">${u.label}</span>
                        </div>
                        <p class="card-text mb-1"><strong>RUT:</strong> ${p.rut}</p>
                        <p class="card-text mb-1"><strong>Edad:</strong> ${p.edad} años &nbsp;|&nbsp; <strong>Sexo:</strong> ${p.sexo}</p>
                        <hr class="my-2">
                        <p class="card-text mb-1">
                            <strong>Dolor:</strong> ${p.informacionClinica.nivelDolor}/10 &nbsp;
                            <strong>SpO₂:</strong> ${p.signosVitales.spo2}% &nbsp;
                            <strong>Temp:</strong> ${p.signosVitales.temperatura}°C
                        </p>
                        <p class="card-text mb-1">
                            <strong>Presión:</strong> ${p.signosVitales.presion.sistolica}/${p.signosVitales.presion.diastolica} mmHg &nbsp;
                            <strong>Pulso:</strong> ${p.signosVitales.pulsaciones} bpm
                        </p>
                        <hr class="my-2">
                        <p class="card-text mb-1"><strong>Síntomas:</strong> ${p.sintomas.join(', ') || 'No especificados'}</p>
                        ${p.diagnostico ? `<p class="card-text mb-1"><strong>Diagnóstico:</strong> ${p.diagnostico}</p>` : ''}
                        <p class="card-text mb-1"><strong>Alergias:</strong> ${p.informacionClinica.alergias}</p>
                        <div class="mt-3 d-flex justify-content-end flex-wrap gap-1">
                            ${btnReceta}
                            <a href="registro.html" class="btn btn-sm btn-primary btn-edit" data-id="${p.id}">✏️ Editar</a>
                            <button class="btn btn-sm btn-danger btn-delete" data-id="${p.id}">🗑️ Eliminar</button>
                        </div>
                    </div>
                    <div class="card-footer text-muted small">Registrado: ${p.fechaRegistro}</div>
                </div>
            </div>`;
        }

        // ── Mensaje temporal ───────────────────────────────────────
        function mostrarMensaje(texto, clase) {
            const div = document.getElementById('mensaje-pagina');
            div.innerHTML = `<div class="alert ${clase} alert-dismissible fade show" role="alert">
                ${texto}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
            setTimeout(() => { div.innerHTML = ''; }, 4000);
        }

        function logoutUser(e) {
            e.preventDefault();
            if (confirm('¿Desea cerrar sesión?')) {
                auth.logout();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
