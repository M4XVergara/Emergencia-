<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Bienestar - Registro de Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/favicon_clinica.png">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
        }
        .register-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.18);
            width: 100%;
            max-width: 620px;
            padding: 32px;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="text-center mb-4">
            <h1 class="h3">Registro de Paciente</h1>
            <p class="text-muted">Crea tu cuenta con RUT y contraseña para ver recetas e historial clínico.</p>
        </div>

        <div class="alert alert-danger d-none" id="error-message"></div>
        <div class="alert alert-success d-none" id="success-message"></div>

        <form id="registerForm" novalidate>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellido Paterno</label>
                    <input type="text" class="form-control" id="apellidoPaterno" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellido Materno</label>
                    <input type="text" class="form-control" id="apellidoMaterno" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">RUT</label>
                    <input type="text" class="form-control" id="rut" placeholder="12.345.678-9" maxlength="12" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="Mínimo 6 caracteres" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Confirmar contraseña</label>
                    <input type="password" class="form-control" id="confirmPassword" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-4" id="btnRegister">Crear Cuenta</button>
        </form>

        <div class="text-center mt-3">
            <a href="login.html">Ya tengo cuenta, iniciar sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/validation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('registerForm');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const btn = document.getElementById('btnRegister');
            const validator = new Validator();

            const formatRut = (value) => {
                let rut = value.replace(/[^0-9kK]/g, '').slice(0, 10);
                let body = rut.slice(0, -1);
                let dv = rut.slice(-1);
                if (rut.length > 1) {
                    body = body.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.');
                    return `${body}-${dv}`;
                }
                return rut;
            };

            document.getElementById('rut').addEventListener('input', (event) => {
                event.target.value = formatRut(event.target.value);
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMessage.classList.add('d-none');
                successMessage.classList.add('d-none');

                const formData = {
                    nombre: document.getElementById('nombre').value.trim(),
                    apellidoPaterno: document.getElementById('apellidoPaterno').value.trim(),
                    apellidoMaterno: document.getElementById('apellidoMaterno').value.trim(),
                    rut: document.getElementById('rut').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value,
                    confirmPassword: document.getElementById('confirmPassword').value
                };

                const validationResult = validator.validatePatientRegistration(formData);
                if (!validationResult.isValid) {
                    errorMessage.innerHTML = `<ul class="mb-0">${validationResult.errors.map(err => `<li>${err}</li>`).join('')}</ul>`;
                    errorMessage.classList.remove('d-none');
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Registrando...';

                try {
                    const { data: existingByUsername, error: existingError } = await _supabase
                        .from('usuarios')
                        .select('id')
                        .eq('username', formData.rut)
                        .maybeSingle();

                    if (existingError) {
                        throw new Error(existingError.message);
                    }
                    if (existingByUsername) {
                        throw new Error('Ya existe una cuenta con este RUT. Intenta iniciar sesión.');
                    }

                    const { error } = await _supabase.from('usuarios').insert([{
                        nombre: formData.nombre,
                        apellido: `${formData.apellidoPaterno} ${formData.apellidoMaterno}`,
                        email: formData.email,
                        username: formData.rut,
                        password: formData.password,
                        rol: 'cliente',
                        activo: true
                    }]);

                    if (error) {
                        throw new Error(error.message);
                    }

                    sessionStorage.setItem('registrationSuccess', 'Cuenta creada correctamente. Ahora puedes iniciar sesión con tu RUT y contraseña.');
                    window.location.href = 'login.html';
                } catch (err) {
                    console.error(err);
                    errorMessage.textContent = err.message || 'Error al crear la cuenta. Intenta nuevamente.';
                    errorMessage.classList.remove('d-none');
                    btn.disabled = false;
                    btn.textContent = 'Crear Cuenta';
                }
            });
        });
    </script>
</body>
</html>
