<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Bienestar - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/favicon_clinica.png">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #0d6efd; font-size: 28px; margin-bottom: 10px; }
        .login-header p { color: #6c757d; font-size: 14px; }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.25); }
        .btn-login { width: 100%; padding: 10px; font-size: 16px; margin-top: 20px; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #0d6efd; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🏥 Clínica Bienestar</h1>
            <p>Acceso para personal y pacientes</p>
        </div>
        <link rel="icon" type="image/png" href="images/favicon_clinica.png">
        <div class="alert alert-danger d-none" id="error-message"></div>
        <div class="alert alert-success d-none" id="success-message"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">RUT</label>
                <input type="text" class="form-control" id="username" placeholder="Usuario o 12.345.678-9" required>
                <div class="form-text">Si eres paciente, ingresa tu RUT como usuario.</div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login" id="btnLogin">
                Iniciar Sesión
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="registro-paciente.html" class="btn btn-outline-secondary btn-sm">¿No tienes cuenta? Regístrate como paciente</a>
        </div>
        <div class="back-link mt-3">
            <a href="index.html">← Volver al Inicio</a>
        </div>
    </div>

    <!-- SDK Supabase ANTES de supabase.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <!-- SweetAlert2: alertas mejoradas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js"></script>
    <script>
        // Si ya está autenticado, redirigir según el rol
        if (auth.isAuthenticated()) {
            const roleRedirect = auth.getRol() === 'cliente' ? 'portal-paciente.html' : 'registro.html';
            window.location.href = roleRedirect;
        }

        // Mostrar mensaje de registro exitoso con SweetAlert2 si existe
        const registrationSuccess = sessionStorage.getItem('registrationSuccess');
        if (registrationSuccess) {
            if (typeof Swal !== 'undefined') {
                Swal.fire({ icon: 'success', title: 'Registro completado', text: registrationSuccess, confirmButtonText: 'Aceptar' });
            } else {
                const successMsg = document.getElementById('success-message');
                successMsg.textContent = registrationSuccess;
                successMsg.classList.remove('d-none');
            }
            sessionStorage.removeItem('registrationSuccess');
        }

        const usernameInput = document.getElementById('username');
        usernameInput.addEventListener('input', (event) => {
            const value = event.target.value.replace(/[^0-9kK]/gi, '').toUpperCase();
            const body = value.slice(0, -1);
            const dv = value.slice(-1);
            if (value.length > 1) {
                event.target.value = `${body.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.')}-${dv}`;
            } else {
                event.target.value = value;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            btn.disabled = true;
            btn.textContent = 'Verificando...';

            const result = await auth.login(username, password);

            if (result.success) {
                const roleRedirect = result.rol === 'cliente' ? 'portal-paciente.html' : 'registro.html';
                if (typeof Swal !== 'undefined') {
                    Swal.fire({ icon: 'success', title: 'Bienvenido', text: 'Redirigiendo...', timer: 1200, showConfirmButton: false });
                    setTimeout(() => { window.location.href = roleRedirect; }, 1200);
                } else {
                    window.location.href = roleRedirect;
                }
            } else {
                if (typeof Swal !== 'undefined') {
                    Swal.fire({ icon: 'error', title: 'Error', text: result.message, confirmButtonText: 'Aceptar' });
                } else {
                    const errorMsg = document.getElementById('error-message');
                    errorMsg.textContent = `✗ ${result.message}`;
                    errorMsg.classList.remove('d-none');
                }
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
            }
        });
    </script>
</body>
</html>
